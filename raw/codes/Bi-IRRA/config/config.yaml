device: 5

misc:
  seed: 1

experiment:
  # image
  input_resolution: [224, 224]
  # text
  text_length: 77

schedule:
  lr: 5.0e-5
  epoch: 10
  epoch_warmup: 1
  lr_start: 1.0e-6
  lr_end: 5.0e-6
  weight_decay: 0.02
  betas: [0.9, 0.98]
  eps: 1.0e-8
  ratio_factor: 1.0

model:
  resume: '/path/to/cclm_x2vlm_base.th'
  saved_path: 'ckpts/CUHK-PEDES/'
  use_gather: true
  embed_dim: 256
  temp: 0.07
  k_test: 256

itm:
  weight: 4.0
  use_mask: True

mim:
  weight: 4.0
  use_mim: True
  mask_ratio: 0.5

mlm:
  is_mlm: True
  mask_prob: 0.4
  max_masks: 12
  skipgram_prb: 0.2
  skipgram_size: 3

sdm:
  use_sdm: False

id:
  use_id: False
## Vision Encoder
vision_config: 'config/config_beit2_base.json'

use_clip_vit: False

use_beit_v2: True
image_res: 224
patch_size: 16

## Text Encoder (& Cross Encoder)
text_encoder: '/path/to/xlm-roberta-base'
text_num_hidden_layers: 18
text_fusion_start_at: 12

## Training
use_one_cl_proj_only: False

log:
  print_period: 50

data:
  batch_size: 32
  test_batch_size: 128
  num_workers: 8
  source_language: en # en 
  target_language: ch # ch, fr, de 

distributed:
  backend: nccl
  url: 'env://'

anno_dir: '/path/to/annos'    # e.g., 'data/CUHK-PEDES'
image_dir: '/path/to/imgs'     # e.g., '../../datasets/cuhkpedes/imgs'
